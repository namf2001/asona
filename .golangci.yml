run:
  # The Go version to use for the analysis.
  # Now using the environment's version (1.26.1).
  go: '1.26'
  timeout: 10m

issues:
  # The linter may have many false positives when first run.
  # This helps clean up initial errors.
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
